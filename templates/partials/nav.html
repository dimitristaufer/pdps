<header class="site-nav">
    <div class="container nav-inner">
        <a class="brand" href="{{ get_url(path = '/') }}">{{ config.extra.site_short }}</a>
        <input id="nav-toggle" class="nav-toggle" type="checkbox" aria-label="Toggle navigation">
        <label for="nav-toggle" class="nav-toggle-label">
            <span></span>
            <span></span>
            <span></span>
        </label>
        <nav class="nav-links" aria-label="Primary">
            {% for item in config.extra.nav %}
                {% set item_url = item.url %}
                {% set is_highlight = item.highlight | default(value = false) %}
                <a class="nav-link{% if is_highlight %} nav-cta{% endif %}" href="{{ get_url(path = item_url) | safe }}">{{ item.name }}</a>
            {% endfor %}
            <a class="nav-link nav-link--editor" href="/editor/">Editor</a>
        </nav>
    </div>
</header>
