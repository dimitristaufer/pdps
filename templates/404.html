{% extends "default.html" %}

{% block header %}
<section class="page-hero">
    <div class="container">
        <p class="eyebrow">Page not found</p>
        <h1>404</h1>
        <p class="lead">The page you are looking for does not exist or has moved.</p>
        <a class="btn" href="{{ get_url(path = '/') }}">Back to home</a>
    </div>
</section>
{% endblock %}

{% block main %}
<main id="content" aria-label="Content">
    <div class="section section--light">
        <section class="container content">
            <p>If you followed an older programme link, use the archive to find the relevant edition.</p>
            <a class="btn btn--ghost" href="{{ get_url(path = '/archive/') }}">View archive</a>
        </section>
    </div>
</main>
{% endblock main %}
